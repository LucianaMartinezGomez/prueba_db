version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: prueba
    restart: always
    environment:
      POSTGRES_USER: user_pruebariwi
      POSTGRES_PASSWORD: password_pruebariwi
      POSTGRES_DB: pruebariwi_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo-db:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27018:27017" # <--- Solución: Entras por el 27018 para evitar el bloqueo
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
